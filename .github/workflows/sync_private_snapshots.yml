name: Publish latest (from private)

on:
  workflow_dispatch:
  schedule:
    - cron: "05 0 * * *" # daily 00:05 UTC

permissions:
  contents: write

concurrency:
  group: publish-latest
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest snapshot from private repo (GitHub API)
        env:
          RWA_DATA_TOKEN: ${{ secrets.RWA_DATA_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          API_URL="https://api.github.com/repos/vpweb7/rwa.watch-data/contents/_private/snapshots/latest.json?ref=main"
          echo "API_URL=$API_URL"

          curl --http1.1 -fL --retry 5 --retry-all-errors --retry-delay 2 \
            -H "Authorization: Bearer $RWA_DATA_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL" \
            -o /tmp/latest_meta.json

          echo "First lines of API response:"
          head -n 30 /tmp/latest_meta.json || true

          python - <<'PY'
          import json, base64, sys

          with open("/tmp/latest_meta.json", "r", encoding="utf-8") as f:
              j = json.load(f)

          if "content" not in j:
              msg = j.get("message", "no message")
              raise SystemExit(f"No 'content' in API response. message={msg}")

          data = base64.b64decode(j["content"])
          with open("data/latest.json", "wb") as out:
              out.write(data)

          print("Wrote data/latest.json bytes:", len(data))
          PY

          echo "Downloaded data/latest.json:"
          ls -lah data/latest.json
          head -n 5 data/latest.json

      - name: Commit & push if changed
        run: |
          git config user.name "rwa.watch bot"
          git config user.email "actions@users.noreply.github.com"
          if git status --porcelain | grep -q .; then
            git add data/latest.json
            git commit -m "Publish latest snapshot"
            git pull --rebase origin main
            git push
          else
            echo "No changes."
          fi
