name: Publish latest (from private)

on:
  workflow_dispatch:
  schedule:
    - cron: "05 0 * * *" # daily 00:05 UTC

permissions:
  contents: write

concurrency:
  group: publish-latest
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest snapshot from private repo (GitHub API)
        env:
          RWA_DATA_TOKEN: ${{ secrets.RWA_DATA_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data

          curl -fL \
            -H "Authorization: Bearer $RWA_DATA_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/vpweb7/rwa.watch-data/contents/_private/snapshots/latest.json?ref=main" \
            | python -c "import sys, json, base64; print(base64.b64decode(json.load(sys.stdin)['content']).decode('utf-8'))" \
            > data/latest.json

          echo "Downloaded data/latest.json:"
          ls -lah data/latest.json
          head -n 5 data/latest.json

      - name: Commit & push if changed
        run: |
          git config user.name "rwa.watch bot"
          git config user.email "actions@users.noreply.github.com"
          if git status --porcelain | grep -q .; then
            git add data/latest.json
            git commit -m "Publish latest snapshot"
            git pull --rebase origin main
            git push
          else
            echo "No changes."
          fi
