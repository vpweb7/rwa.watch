name: Update sparklines

on:
  schedule:
    - cron: "10 0 * * *" # daily 00:10 UTC
  workflow_dispatch:

concurrency:
  group: sparklines
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build ALL sparklines (single pass)
        run: |
          mkdir -p data
          node tools/update_sparklines.mjs --mode all --part 0/1 --out data/sparklines_all_7d.json

      - name: Build RWA sparklines (single pass)
        run: |
          mkdir -p data
          node tools/update_sparklines.mjs --mode rwa --part 0/1 --out data/sparklines_rwa_7d.json

      - name: Commit & push if changed
        run: |
          git config user.name "rwa.watch bot"
          git config user.email "actions@users.noreply.github.com"
          if git status --porcelain | grep -q .; then
            git add data/sparklines_all_7d.json data/sparklines_rwa_7d.json
            git commit -m "Auto-update sparklines"
            git pull --rebase origin main
            git push
          else
            echo "No changes."
          fi
