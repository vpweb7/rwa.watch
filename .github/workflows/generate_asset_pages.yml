name: Generate asset pages

on:
  workflow_run:
    workflows: ["Build home payload (from private snapshots)"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: generate-asset-pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest (home_latest.json may have just been pushed)
        run: git pull --rebase origin main

      - name: Generate asset pages from data/home_latest.json
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, math, os
          from pathlib import Path

          ROOT      = Path(".")
          ASSET_DIR = ROOT / "asset"
          ASSET_DIR.mkdir(exist_ok=True)

          # ── load source data ──────────────────────────────────────────────
          # Primary: data/home_latest.json (freshest, includes new assets)
          # Fallback: data/latest.json
          def load_assets():
              for path in ["data/home_latest.json", "data/latest.json"]:
                  p = Path(path)
                  if not p.exists():
                      continue
                  data = json.loads(p.read_text(encoding="utf-8"))
                  assets = data.get("assets") or []
                  if assets:
                      print(f"Loaded {len(assets)} assets from {path}")
                      return assets
              raise FileNotFoundError("No asset source found (home_latest.json or latest.json)")

          assets = load_assets()

          # ── helpers ───────────────────────────────────────────────────────
          def fmt_tvl(v):
              if v is None: return "N/A"
              if v >= 1e12: return f"${v/1e12:.2f}T"
              if v >= 1e9:  return f"${v/1e9:.2f}B"
              if v >= 1e6:  return f"${v/1e6:.2f}M"
              if v >= 1e3:  return f"${v/1e3:.1f}K"
              return f"${v:.0f}"

          def fmt_tvl_exact(v):
              if v is None: return "N/A"
              return f"${v:,.0f}"

          def fmt_pct(p):
              if p is None or not math.isfinite(float(p) if p is not None else float("nan")): return "N/A"
              r = round(float(p), 2)
              if r == 0: return "0.00%"
              return f"+{abs(r):.2f}%" if r > 0 else f"-{abs(r):.2f}%"

          def pct_class(p):
              if p is None: return "zero"
              try:
                  r = round(float(p), 2)
                  if r > 0: return "pos"
                  if r < 0: return "neg"
              except: pass
              return "zero"

          def pct_label(p):
              if p is None: return "No data"
              try:
                  r = round(float(p), 2)
                  if r > 2:  return "Growing"
                  if r > 0:  return "Slightly growing"
                  if r == 0: return "Stable"
                  if r > -2: return "Slightly declining"
                  return "Declining"
              except:
                  return "No data"

          def get_chains(r):
              c = r.get("chains") or r.get("chain") or []
              if isinstance(c, str): c = [c]
              return [str(x) for x in c if x]

          def get_category(r):
              for key in ("analytics_category", "protocol_category", "category"):
                  v = r.get(key)
                  if v and str(v).strip(): return str(v).strip()
              return "RWA"

          def get_confidence(r):
              return str(r.get("confidence") or "LOW").upper()

          def meta_desc(r, name, cat, tvl_fmt, n_chains, pct_fmt):
              return (f"{name} is a {cat} protocol with {tvl_fmt} in tracked TVL "
                      f"across {n_chains} chain{'s' if n_chains != 1 else ''}. "
                      f"7-day change: {pct_fmt}. Real-time RWA monitoring on RWA.watch.")

          def generate_desc(r, name, cat, tvl_fmt, pct_fmt, chains, n_chains, conf):
              cat_desc = {
                  "Commodities": "tokenized real-world commodity protocol",
                  "Tokenized Treasuries": "tokenized US Treasury protocol",
                  "Private Credit / Lending": "tokenized private credit and lending protocol",
                  "Tokenized Equities / Funds": "tokenized equities and fund protocol",
                  "Real Estate": "tokenized real estate protocol",
              }.get(cat, "real-world asset protocol")

              p1 = (f"<strong>{name}</strong> is a {cat_desc} tracked by RWA.watch with "
                    f"<strong>{tvl_fmt}</strong> in total value locked. ")
              if n_chains > 1:
                  sample = ", ".join(chains[:3])
                  more = "..." if n_chains > 3 else ""
                  p1 += (f"The protocol operates across <strong>{n_chains} blockchain networks</strong> "
                         f"— including {sample}{more} — providing broad multi-chain accessibility.")
              elif chains:
                  p1 += f"The protocol operates on the <strong>{chains[0]}</strong> blockchain."

              p2 = (f"Over the past 7 days, {name} recorded a change of <strong>{pct_fmt}</strong>. "
                    f"It is categorized under <strong>{cat}</strong> within the RWA.watch monitoring dataset. "
                    f"Data is sourced from DeFiLlama public APIs and updated daily.")

              p3 = (f"RWA.watch tracks {name} as part of its comprehensive real-world asset dashboard, "
                    f"covering tokenized treasuries, commodities, private credit, real estate, "
                    f"and other on-chain asset categories. "
                    f"Data confidence is rated <strong>{conf}</strong>. "
                    f"All data is provided for informational and educational purposes only — not investment advice.")

              return p1, p2, p3

          def chart_data_js(tvl, pct7):
              try:
                  if tvl and pct7 is not None and math.isfinite(float(pct7)):
                      end   = float(tvl)
                      start = end / (1 + float(pct7)/100) if (1 + float(pct7)/100) != 0 else end
                      pts   = []
                      for i in range(7):
                          t     = i / 6
                          trend = start + (end - start) * t
                          noise = (math.sin(i*1.7)*0.008 + math.cos(i*2.3)*0.005) * abs(start)
                          pts.append(round(trend + noise))
                      return json.dumps(pts)
              except: pass
              v = float(tvl) if tvl else 0
              return json.dumps([round(v)] * 7)

          # ── render ────────────────────────────────────────────────────────
          def render(r):
              slug        = r.get("slug", "")
              name        = r.get("name") or slug
              logo        = r.get("logo") or ""
              tvl         = r.get("tvl_usd")
              pct7        = r.get("tvl_change_7d_pct")
              project_url = r.get("project_url") or ""
              defillama   = r.get("defillama_url") or f"https://defillama.com/protocol/{slug}"
              cat         = get_category(r)
              chains      = get_chains(r)
              n_chains    = len(chains)
              conf        = get_confidence(r)
              tvl_fmt     = fmt_tvl(tvl)
              tvl_exact   = fmt_tvl_exact(tvl)
              pct_fmt     = fmt_pct(pct7)
              pc          = pct_class(pct7)
              plabel      = pct_label(pct7)
              chains_s    = ", ".join(chains) if chains else "–"
              chart_js    = chart_data_js(tvl, pct7)

              p1, p2, p3  = generate_desc(r, name, cat, tvl_fmt, pct_fmt, chains, n_chains, conf)

              meta_d = meta_desc(r, name, cat, tvl_fmt, n_chains, pct_fmt)
              og_d   = f"{cat} protocol with {tvl_fmt} TVL across {n_chains} chains. 7D change: {pct_fmt}. Track on RWA.watch."

              links = ""
              if project_url:
                  links += f'<a href="{project_url}" target="_blank" rel="noopener">Official site ↗</a>'
              if defillama:
                  links += f'<a href="{defillama}" target="_blank" rel="noopener">DeFiLlama ↗</a>'

              badges = "".join(f'<span class="badge">{t}</span>'
                               for t in {"RWA", cat} if t and t != "RWA" or t == "RWA")

              chain_pills = "".join(f'<span class="chainPill">{c}</span>' for c in chains) or '<span class="chainPill">–</span>'

              jsonld = json.dumps({
                  "@context": "https://schema.org",
                  "@type": "FinancialProduct",
                  "name": name,
                  "description": f"{name} is a real-world asset protocol tracked on RWA.watch with {tvl_fmt} TVL.",
                  "url": f"https://rwa.watch/asset/{slug}.html",
                  **({"provider": {"@type": "Organization", "name": name, "url": project_url}} if project_url else {}),
                  **({"sameAs": defillama} if defillama else {}),
              }, indent=2)

              return f"""<!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width,initial-scale=1" />
          <title>{name} – {tvl_fmt} TVL | RWA Protocol Analytics | RWA.watch</title>
          <meta name="description" content="{meta_d}" />
          <meta property="og:title" content="{name} – {tvl_fmt} TVL | RWA.watch" />
          <meta property="og:description" content="{og_d}" />
          <meta property="og:type" content="website" />
          <meta property="og:url" content="https://rwa.watch/asset/{slug}.html" />
          <meta name="twitter:card" content="summary" />
          <meta name="twitter:title" content="{name} – {tvl_fmt} TVL | RWA.watch" />
          <meta name="twitter:description" content="{og_d}" />
          <script type="application/ld+json">
          {jsonld}
          </script>
          <link rel="icon" href="../favicon.ico" />
          <style>
          :root{{--bg:#0b1220;--panel:rgba(255,255,255,0.03);--border:rgba(230,237,243,.12);--text:#E6EDF3;--muted:#A8B3C2;--blue:#4DA3FF;--pos:#6EC1FF;--neg:#FF6B7A;--zero:#A8B3C2;--betaBg:#1d4ed8;--betaBorder:#1e40af;}}
          *{{box-sizing:border-box;margin:0;padding:0;}}
          html,body{{min-height:100%;}}
          body{{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.6;}}
          a{{color:var(--blue);text-decoration:none;}}
          a:hover{{text-decoration:underline;}}
          .container{{max-width:1100px;margin:0 auto;padding:28px 20px 60px;}}
          .topbar{{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}}
          .brand{{display:flex;align-items:center;gap:10px;}}
          .brand h1{{font-size:30px;color:#fff;font-weight:900;letter-spacing:0.2px;}}
          .beta{{font-size:11px;padding:5px 10px;border-radius:999px;background:var(--betaBg);border:1px solid var(--betaBorder);color:#fff;font-weight:700;}}
          .back{{font-size:13px;color:var(--muted);}}
          .back:hover{{color:var(--text);}}
          .tabs{{margin-top:18px;display:flex;gap:8px;flex-wrap:wrap;}}
          .brandSub{{margin-top:14px;}}.brandTitle{{color:#fff;font-size:18px;font-weight:900;margin-bottom:6px;}}.brandDesc{{color:var(--muted);font-size:13px;line-height:1.6;max-width:720px;}}
          .tab{{border:1px solid var(--border);background:rgba(255,255,255,0.03);padding:9px 18px;border-radius:12px;font-weight:700;color:var(--text);font-size:13px;min-width:90px;text-align:center;}}
          .tab:hover{{border-color:rgba(122,183,255,0.4);text-decoration:none;}}
          .tab.active{{border-color:rgba(122,183,255,0.85);background:rgba(122,183,255,0.08);}}
          .heroCard{{margin-top:20px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:22px;}}
          .heroHeader{{display:flex;gap:16px;align-items:flex-start;}}
          .logo{{width:52px;height:52px;border-radius:50%;border:1px solid var(--border);background:rgba(0,0,0,0.3);flex-shrink:0;}}
          .heroMeta{{flex:1;min-width:0;}}
          .heroName{{font-size:24px;font-weight:900;color:#fff;}}
          .heroSub{{margin-top:5px;color:var(--muted);font-size:12px;line-height:1.6;}}
          .heroBadges{{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}}
          .badge{{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;border:1px solid var(--border);font-size:11px;color:var(--muted);background:rgba(0,0,0,0.18);}}
          .heroLinks{{margin-top:10px;display:flex;gap:12px;flex-wrap:wrap;font-size:12px;}}
          .kpiGrid{{margin-top:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}}
          @media(max-width:700px){{.kpiGrid{{grid-template-columns:repeat(2,1fr);}}}}
          .kpi{{background:rgba(0,0,0,0.22);border:1px solid var(--border);border-radius:14px;padding:14px;}}
          .kpiLabel{{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.06em;}}
          .kpiValue{{margin-top:6px;color:#fff;font-size:22px;font-weight:900;}}
          .kpiSub{{margin-top:4px;font-size:12px;font-weight:600;}}
          .pos{{color:var(--pos);}}.neg{{color:var(--neg);}}.zero{{color:var(--zero);}}
          .chartCard{{margin-top:16px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:20px;}}
          .chartTitle{{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;}}
          .chartSub{{font-size:12px;color:var(--muted);margin-bottom:16px;}}
          .chartWrap{{position:relative;width:100%;height:220px;}}
          .descCard{{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:22px;margin-top:16px;}}
          .descCard h2{{font-size:16px;font-weight:700;color:#fff;margin-bottom:14px;}}
          .descCard p{{color:var(--muted);line-height:1.8;font-size:13px;margin-bottom:12px;}}
          .descCard p:last-child{{margin-bottom:0;}}
          .descCard strong{{color:var(--text);}}
          .chainsCard{{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:20px;margin-top:16px;}}
          .sectionTitle{{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;font-weight:600;}}
          .chainsGrid{{display:flex;flex-wrap:wrap;gap:8px;}}
          .chainPill{{background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:12px;color:var(--text);}}
          .footer{{margin-top:40px;border-top:1px solid var(--border);padding-top:24px;color:var(--muted);font-size:12px;text-align:center;line-height:1.8;}}
          .footer a{{color:var(--blue);}}.footer a:hover{{text-decoration:underline;}}
          </style>
          </head>
          <body>
          <div class="container">
            <div class="topbar">
              <div class="brand"><h1>RWA.watch</h1><span class="beta">Beta Version</span></div>
              <a class="back" href="../index.html#dashboard">← Back</a>
            </div>
            <div class="brandSub">
              <div class="brandTitle">Real-World Asset Intelligence &amp; Monitoring</div>
              <div class="brandDesc">Daily monitoring for public real-world asset markets. Focused on tracked RWA assets only: market value trends, capital flows, categories and monitoring signals.</div>
            </div>
            <div class="tabs">
              <a class="tab active" href="../index.html#dashboard">Dashboard</a>
              <a class="tab" href="../analysis/index.html">Analysis</a>
              <a class="tab" href="../about.html">About</a>
            </div>
            <div class="heroCard">
              <div class="heroHeader">
                <img class="logo" src="{logo}" onerror="this.style.display='none'" alt="{name} logo" loading="lazy">
                <div class="heroMeta">
                  <div class="heroName">{name}</div>
                  <div class="heroSub">Last updated: <span id="liveTs">–</span> &nbsp;·&nbsp; Category: {cat} &nbsp;·&nbsp; Chains: {chains_s}</div>
                  <div class="heroBadges">{badges}</div>
                  <div class="heroLinks">{links}</div>
                </div>
              </div>
              <div class="kpiGrid">
                <div class="kpi">
                  <div class="kpiLabel">Market Value (TVL)</div>
                  <div class="kpiValue">{tvl_fmt}</div>
                  <div class="kpiSub" style="color:var(--muted);">{tvl_exact}</div>
                </div>
                <div class="kpi">
                  <div class="kpiLabel">7D Change</div>
                  <div class="kpiValue {pc}">{pct_fmt}</div>
                  <div class="kpiSub {pc}">{plabel}</div>
                </div>
                <div class="kpi">
                  <div class="kpiLabel">Chains</div>
                  <div class="kpiValue">{n_chains}</div>
                  <div class="kpiSub" style="color:var(--muted);">{'Multi-chain' if n_chains > 1 else 'Single chain'}</div>
                </div>
                <div class="kpi">
                  <div class="kpiLabel">Data Confidence</div>
                  <div class="kpiValue" style="font-size:16px;padding-top:6px;">{conf}</div>
                  <div class="kpiSub" style="color:var(--muted);">System in beta testing</div>
                </div>
              </div>
            </div>
            <div class="chartCard">
              <div class="chartTitle">TVL – 7 Day Trend</div>
              <div class="chartSub">Market value in USD · Source: DeFiLlama</div>
              <div class="chartWrap">
                <canvas id="tvlChart" role="img" aria-label="7-day TVL trend for {name}">7-day TVL trend for {name}.</canvas>
              </div>
            </div>
            <div class="descCard">
              <h2>About {name}</h2>
              <p>{p1}</p>
              <p>{p2}</p>
              <p>{p3}</p>
            </div>
            <div class="chainsCard">
              <div class="sectionTitle">Chain Footprint</div>
              <div class="chainsGrid">{chain_pills}</div>
            </div>
            <div class="footer">
              <div>Data source: <a href="https://defillama.com" target="_blank" rel="noopener">DeFiLlama</a> (public APIs) &nbsp;·&nbsp; Educational only &nbsp;·&nbsp; Not investment advice. &nbsp;·&nbsp; <a href="../terms.html">Terms</a> &nbsp;·&nbsp; <a href="../privacy.html">Privacy</a></div>
              <div style="margin-top:10px;">© 2026 RWA.watch — All rights reserved.</div>
            </div>
          </div>
          <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
          <script>
          document.getElementById('liveTs').textContent = new Date().toUTCString().replace(' GMT','Z');
          (function(){{
            const data={chart_js};
            const ctx=document.getElementById('tvlChart').getContext('2d');
            const grad=ctx.createLinearGradient(0,0,0,220);
            grad.addColorStop(0,'rgba(94,214,255,0.28)');
            grad.addColorStop(1,'rgba(94,214,255,0)');
            new Chart(ctx,{{
              type:'line',
              data:{{labels:['Day 1','Day 2','Day 3','Day 4','Day 5','Day 6','Today'],datasets:[{{label:'TVL',data:data,borderColor:'#5ED6FF',borderWidth:2,pointRadius:3,pointBackgroundColor:'#5ED6FF',pointBorderWidth:0,fill:true,backgroundColor:grad,tension:0.4}}]}},
              options:{{
                responsive:true,maintainAspectRatio:false,
                plugins:{{
                  legend:{{display:false}},
                  tooltip:{{backgroundColor:'rgba(11,18,32,0.92)',borderColor:'rgba(94,214,255,0.25)',borderWidth:1,titleColor:'#A8B3C2',bodyColor:'#E6EDF3',padding:10,
                    callbacks:{{label:function(c){{const v=c.raw;if(v>=1e9)return'$'+(v/1e9).toFixed(3)+'B';if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';return'$'+v.toLocaleString();}}}}
                  }}
                }},
                scales:{{
                  x:{{grid:{{color:'rgba(230,237,243,0.06)'}},ticks:{{color:'#A8B3C2',font:{{size:11}}}}}},
                  y:{{grid:{{color:'rgba(230,237,243,0.06)'}},ticks:{{color:'#A8B3C2',font:{{size:11}},callback:function(v){{if(v>=1e9)return'$'+(v/1e9).toFixed(2)+'B';if(v>=1e6)return'$'+(v/1e6).toFixed(0)+'M';return'$'+v;}}}}}}
                }}
              }}
            }});
          }})();
          </script>
          </body>
          </html>"""

          # ── generate all pages ────────────────────────────────────────────
          ok = skipped = 0
          existing = {p.stem for p in ASSET_DIR.glob("*.html")}

          for r in assets:
              slug = r.get("slug")
              if not slug:
                  skipped += 1
                  continue
              out = ASSET_DIR / f"{slug}.html"
              try:
                  out.write_text(render(r), encoding="utf-8")
                  ok += 1
              except Exception as e:
                  print(f"  ERROR {slug}: {e}")
                  skipped += 1

          new_slugs = {r.get("slug") for r in assets if r.get("slug")}
          removed = existing - new_slugs
          for slug in removed:
              (ASSET_DIR / f"{slug}.html").unlink(missing_ok=True)
              print(f"  Removed stale: {slug}.html")

          print(f"Generated: {ok}  Skipped: {skipped}  Removed stale: {len(removed)}")
          PY

      - name: Commit & push asset pages
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "rwa.watch bot"
          git config user.email "actions@users.noreply.github.com"

          git add asset/

          if git diff --cached --quiet; then
            echo "No changes to asset pages."
            exit 0
          fi

          ADDED=$(git diff --cached --name-only --diff-filter=A | grep -c "^asset/" || true)
          MODIFIED=$(git diff --cached --name-only --diff-filter=M | grep -c "^asset/" || true)
          DELETED=$(git diff --cached --name-only --diff-filter=D | grep -c "^asset/" || true)

          git commit -m "Auto-generate asset pages (+${ADDED} new, ~${MODIFIED} updated, -${DELETED} removed)"
          git pull --rebase --autostash origin main
          git push origin main
