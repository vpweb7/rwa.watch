name: Sync latest.json (from private snapshots) + compute 7D change

on:
  schedule:
    - cron: "35 0 * * *" # daily 00:35 UTC
  workflow_dispatch:

concurrency:
  group: sync-latest-json
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download latest + last up to 8 daily snapshots (GitHub API)
        env:
          RWA_DATA_TOKEN: ${{ secrets.RWA_DATA_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _tmp_snap
          mkdir -p _tmp_snap data

          # 1) latest.json
          curl --http1.1 -fL --retry 5 --retry-all-errors --retry-delay 2 \
            -H "Authorization: Bearer $RWA_DATA_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/vpweb7/rwa.watch-data/contents/_private/snapshots/latest.json?ref=main" \
            -o _tmp_snap/latest_meta.json

          python - <<'PY'
          import json, base64
          j = json.load(open("_tmp_snap/latest_meta.json","r",encoding="utf-8"))
          data = base64.b64decode(j["content"])
          open("_tmp_snap/latest.json","wb").write(data)
          print("latest.json bytes:", len(data))
          PY

          # 2) list snapshots and pick last 8 daily (YYYY-MM-DD.json)
          curl --http1.1 -fL --retry 5 --retry-all-errors --retry-delay 2 \
            -H "Authorization: Bearer $RWA_DATA_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/vpweb7/rwa.watch-data/contents/_private/snapshots?ref=main" \
            -o _tmp_snap/list.json

          python - <<'PY'
          import json, re
          lst = json.load(open("_tmp_snap/list.json","r",encoding="utf-8"))
          names = [x.get("name") for x in lst if isinstance(x,dict)]
          daily = sorted([n for n in names if n and re.match(r"^\d{4}-\d{2}-\d{2}\.json$", n)])
          last8 = daily[-8:]   # need 8 points for true 7D change
          open("_tmp_snap/last8.txt","w",encoding="utf-8").write("\n".join(last8)+"\n")
          print("Selected daily snapshots:", last8)
          PY

          # Download selected dailies
          while read -r fname; do
            [ -z "$fname" ] && continue
            url="https://api.github.com/repos/vpweb7/rwa.watch-data/contents/_private/snapshots/${fname}?ref=main"
            curl --http1.1 -fL --retry 5 --retry-all-errors --retry-delay 2 \
              -H "Authorization: Bearer $RWA_DATA_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$url" \
              -o "_tmp_snap/${fname}.meta.json"

            python - <<PY
          import json, base64
          j = json.load(open("_tmp_snap/${fname}.meta.json","r",encoding="utf-8"))
          data = base64.b64decode(j["content"])
          open("_tmp_snap/${fname}","wb").write(data)
          print("${fname} bytes:", len(data))
          PY
          done < _tmp_snap/last8.txt

      - name: Build data/latest.json with computed tvl_change_7d_pct
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, glob, math
          from datetime import datetime, date

          def load(path):
            with open(path,"r",encoding="utf-8") as f:
              return json.load(f)

          def safe_float(x):
            try:
              if x is None or isinstance(x,bool): return None
              if isinstance(x,(int,float)): return float(x)
              s = str(x).strip()
              if s == "": return None
              return float(s)
            except:
              return None

          def parse_day_from_filename(path):
            # path like _tmp_snap/YYYY-MM-DD.json
            try:
              fn = path.split("/")[-1].split("\\")[-1]
              d = fn.replace(".json","")
              return date.fromisoformat(d)
            except:
              return None

          latest = load("_tmp_snap/latest.json")
          assets_today = latest.get("assets", [])

          # Pick baseline snapshot for true 7D:
          # We want the file that is ~7 days older than the most recent daily available in _tmp_snap.
          daily_files = sorted(glob.glob("_tmp_snap/20??-??-??.json"))
          baseline = None
          baseline_days = None

          if len(daily_files) >= 2:
            # Use most recent daily file as reference day
            ref_file = daily_files[-1]
            ref_day = parse_day_from_filename(ref_file)
            # target baseline day = ref_day - 7 days
            if ref_day:
              target = ref_day.toordinal() - 7
              # choose the daily file with day closest to target but <= ref_day
              best = None
              best_dist = None
              for f in daily_files:
                d = parse_day_from_filename(f)
                if not d:
                  continue
                dist = abs(d.toordinal() - target)
                # prefer exact/closest; allow any (some days might be missing)
                if best is None or dist < best_dist:
                  best = f
                  best_dist = dist
              baseline = load(best) if best else None
              if baseline and ref_day:
                bday = parse_day_from_filename(best)
                baseline_days = (ref_day - bday).days if bday else None
            else:
              # fallback: earliest available among downloaded
              baseline = load(daily_files[0])
              baseline_days = None

          assets_base = baseline.get("assets", []) if baseline else []
          base_by_slug = {a.get("slug"): a for a in assets_base if isinstance(a,dict) and a.get("slug")}

          out_assets = []
          missing_cnt = 0
          computed_cnt = 0

          for a in assets_today:
            if not isinstance(a,dict):
              continue
            slug = a.get("slug")
            tvl_t = safe_float(a.get("tvl_usd"))
            tvl_b = safe_float(base_by_slug.get(slug,{}).get("tvl_usd")) if (baseline and slug) else None

            chg = None
            if tvl_t is not None and tvl_b is not None and tvl_b > 0:
              chg = (tvl_t - tvl_b) / tvl_b * 100.0
              if not math.isfinite(chg):
                chg = None

            if chg is None:
              missing_cnt += 1
            else:
              computed_cnt += 1

            a2 = dict(a)
            a2["tvl_change_7d_pct"] = chg
            # optional debug field; remove if you don't want it in JSON
            a2["tvl_change_7d_days"] = baseline_days
            out_assets.append(a2)

          # ── Net capital flow (24H / 7D) with coverage-artifact handling ──
          # Mirrors the Analysis pipeline so the homepage shows the SAME figures.
          # An asset present today but absent in a comparison snapshot is treated
          # as dataset coverage (new listing), NOT a capital flow, and excluded.
          # Same for assets that left the dataset. This prevents listing changes
          # from showing up as billion-dollar one-day flows.
          EXTREME_PCT = 0.50          # > 50% of prior value ...
          EXTREME_ABS = 100_000_000.0 # ... AND > $100M absolute -> excluded pending confirmation

          def total_tvl(assets):
            t = 0.0
            for a in assets:
              if not isinstance(a, dict):
                continue
              v = safe_float(a.get("tvl_usd"))
              if v is not None:
                t += v
            return t

          def adjusted_net_flow(today_assets, prev_assets):
            """Sum of per-asset deltas, excluding coverage artifacts."""
            if not prev_assets:
              return None, None
            prev_by_slug = {x.get("slug"): x for x in prev_assets if isinstance(x, dict) and x.get("slug")}
            prev_total = 0.0
            for x in prev_assets:
              if isinstance(x, dict):
                pv = safe_float(x.get("tvl_usd"))
                if pv is not None:
                  prev_total += pv
            net = 0.0
            for a in today_assets:
              if not isinstance(a, dict):
                continue
              slug = a.get("slug")
              tvl_t = safe_float(a.get("tvl_usd"))
              if tvl_t is None or not slug:
                continue
              prev = prev_by_slug.get(slug)
              tvl_p = safe_float(prev.get("tvl_usd")) if prev else None
              if tvl_p is None:
                continue  # new in dataset -> coverage, not flow
              delta = tvl_t - tvl_p
              # extreme single-asset move -> exclude pending confirmation
              if tvl_p > 0 and abs(delta) > EXTREME_ABS and abs(delta) / tvl_p > EXTREME_PCT:
                continue
              net += delta
            pct = (net / prev_total * 100.0) if prev_total > 0 else None
            return net, pct

          # 24H: compare today vs the most recent prior daily snapshot
          prev_day_assets = None
          if len(daily_files) >= 2:
            prev_day_assets = load(daily_files[-2]).get("assets", [])
          # 7D: reuse the baseline already selected above (~7 days back)
          base_assets_for_flow = baseline.get("assets", []) if baseline else None

          flow_1d_usd, flow_1d_pct = adjusted_net_flow(assets_today, prev_day_assets)
          flow_7d_usd, flow_7d_pct = adjusted_net_flow(assets_today, base_assets_for_flow)

          headline = {
            "change_1d_usd": flow_1d_usd,
            "change_1d_pct": flow_1d_pct,
            "change_7d_usd": flow_7d_usd,
            "change_7d_pct": flow_7d_pct,
            "flow_basis": "adjusted (coverage artifacts excluded)",
            "total_rwa_tvl": total_tvl(assets_today),
          }
          print("Headline 24H:", flow_1d_usd, "| 7D:", flow_7d_usd)

          latest2 = dict(latest)
          latest2["generated_at"] = latest.get("generated_at") or datetime.utcnow().isoformat(timespec="seconds")+"Z"
          latest2["assets"] = out_assets
          latest2["headline"] = headline

          with open("data/latest.json","w",encoding="utf-8") as f:
            json.dump(latest2, f, ensure_ascii=False)

          print("Wrote data/latest.json assets:", len(out_assets))
          print("Baseline used:", bool(baseline), "baseline_days:", baseline_days, "computed:", computed_cnt, "missing:", missing_cnt)
          PY

      - name: Commit & push if changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "rwa.watch bot"
          git config user.email "actions@users.noreply.github.com"

          git add data/latest.json

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git pull --rebase --autostash origin main
          git commit -m "Sync latest + compute 7D TVL change"
          git push
