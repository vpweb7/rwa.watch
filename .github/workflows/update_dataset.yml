name: Update dataset

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:

concurrency:
  group: dataset
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dataset (single pass from DefiLlama /protocols)
        run: |
          mkdir -p data
          node tools/update_dataset.mjs

      - name: Fill missing 7D change from sparklines (local series)
        run: |
          node tools/fill_dataset_7d_from_sparklines.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "rwa.watch bot"
          git config user.email "actions@users.noreply.github.com"
          if git status --porcelain | grep -q .; then
            git add data/dataset.json
            git commit -m "Auto-update dataset"
            git pull --rebase origin main
            git push
          else
            echo "No changes."
          fi
